<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
  <div class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border animate-in slide-in-from-right fade-in duration-300 backdrop-blur-md min-w-[300px]"
    [ngClass]="{
        'bg-white/90 border-emerald-100 text-emerald-900': toast.type === 'success',
        'bg-white/90 border-rose-100 text-rose-900': toast.type === 'error',
        'bg-white/90 border-sky-100 text-sky-900': toast.type === 'info',
        'bg-white/90 border-amber-100 text-amber-900': toast.type === 'warning'
      }">
    
    <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center"
      [ngClass]="{
          'bg-emerald-100 text-emerald-600': toast.type === 'success',
          'bg-rose-100 text-rose-600': toast.type === 'error',
          'bg-sky-100 text-sky-600': toast.type === 'info',
          'bg-amber-100 text-amber-600': toast.type === 'warning'
        }">
      @if (toast.type === 'success') {
        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
      } @else if (toast.type === 'error') {
        <i data-lucide="x-circle" class="w-5 h-5"></i>
      } @else if (toast.type === 'warning') {
        <i data-lucide="alert-triangle" class="w-5 h-5"></i>
      } @else {
        <i data-lucide="info" class="w-5 h-5"></i>
      }
    </div>

    <div class="flex-1">
      <p class="text-sm font-semibold tracking-tight leading-tight">
        {{toast.message}}
      </p>
    </div>

    <button (click)="toastService.remove(toast.id)" 
      class="flex-shrink-0 p-1 rounded-lg hover:bg-black/5 transition-colors">
      <i data-lucide="x" class="w-4 h-4 opacity-50"></i>
    </button>
  </div>
  }
</div>
