<div class="space-y-10">
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-line pb-4">
        <h4 class="text-[10px] font-bold uppercase tracking-[0.4em] text-muted">Supporting Evidence</h4>
        <span class="text-[9px] font-bold text-line uppercase tracking-widest">{{documents().length}} Files Archive</span>
    </div>

    <!-- Upload Section -->
    <div *ngIf="allowUpload" class="p-8 bg-background border border-line">
        <div class="flex flex-col md:flex-row items-center gap-8">
            <div class="w-10 h-10 bg-primary flex items-center justify-center text-white shrink-0">
                <i data-lucide="upload-cloud" size="18"></i>
            </div>
            <div class="flex-1 text-center md:text-left">
                <p class="text-[10px] font-bold text-ink uppercase tracking-widest mb-1">Upload Dossier Entry</p>
                <p class="text-[8px] text-muted uppercase tracking-[0.2em]">PDF / IMAGE • MAX 10MB</p>
            </div>
            <div class="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto">
                <input type="file" #fileInput (change)="onFileSelected($event)" class="hidden">
                <button (click)="fileInput.click()" 
                    class="px-6 py-3 border border-line text-[9px] font-bold uppercase tracking-widest hover:border-primary transition-all w-full sm:w-auto">
                    {{ selectedFile ? selectedFile.name : 'Select File' }}
                </button>
                <button [disabled]="!selectedFile || uploading()" (click)="upload()" 
                    class="btn-primary w-full sm:w-auto !py-3 !px-8 text-[9px]">
                    <span *ngIf="!uploading()">Deposit</span>
                    <div *ngIf="uploading()" class="animate-spin h-3 w-3 border-2 border-white/20 border-t-white rounded-full"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading() && documents().length === 0" class="py-20 text-center border border-line">
        <i data-lucide="file-x" class="mx-auto text-line mb-4" size="32"></i>
        <p class="text-muted text-[10px] uppercase tracking-widest">No documentation deposited.</p>
    </div>

    <!-- Document List -->
    <div *ngIf="!loading() && documents().length > 0" class="grid gap-px bg-line border border-line">
        <div *ngFor="let doc of documents()" class="group p-6 bg-white flex items-center gap-6 hover:bg-background transition-colors">
            <div [class]="'w-10 h-10 flex items-center justify-center text-white ' + 
                (doc.fileType.includes('pdf') ? 'bg-ink' : 'bg-primary')">
                <i [attr.data-lucide]="doc.fileType.includes('pdf') ? 'file-text' : 'image'" size="18"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-ink uppercase tracking-tight truncate">{{doc.fileName}}</p>
                <div class="flex items-center gap-3 mt-1">
                    <span class="text-[8px] font-bold text-muted uppercase tracking-widest">{{doc.fileType.split('/')[1]}}</span>
                    <span class="w-2 h-px bg-line"></span>
                    <span class="text-[8px] font-medium text-muted uppercase tracking-widest italic opacity-60">{{doc.uploadedAt | date:'mediumDate'}}</span>
                </div>
            </div>
            <button (click)="download(doc.id)" 
                class="w-10 h-10 border border-line text-muted hover:text-primary hover:border-primary transition-all flex items-center justify-center" 
                title="Download">
                <i data-lucide="download" size="16"></i>
            </button>
        </div>
    </div>
</div>
